name: evidencechain

x-secure-service: &secure-service
  restart: unless-stopped
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL

services:
  api:
    <<: *secure-service
    build:
      context: .
      target: api-runtime
    image: ${EVIDENCECHAIN_API_IMAGE:-evidencechain-api:local}
    env_file:
      - ${EVIDENCECHAIN_ENV_FILE:-.env}
    environment:
      APP_ENV: ${APP_ENV:-production}
      APP_DEBUG: "false"
      DATABASE_URL: ${DATABASE_URL:-sqlite+aiosqlite:////data/evidencechain.db}
    volumes:
      - evidencechain-data:/data
      - evidencechain-reports:/app/reports
    expose:
      - "8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health', timeout=3).read()",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  web:
    <<: *secure-service
    build:
      context: .
      target: web-runtime
    image: ${EVIDENCECHAIN_WEB_IMAGE:-evidencechain-web:local}
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${EVIDENCECHAIN_HTTP_PORT:-8080}:8080"
    read_only: true
    tmpfs:
      - /tmp
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  evidencechain-data:
  evidencechain-reports:
