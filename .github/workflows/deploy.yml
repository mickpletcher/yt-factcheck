name: Deploy

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    tags: ["v*.*.*"]

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
      api_image: ${{ steps.meta.outputs.api_image }}
      web_image: ${{ steps.meta.outputs.web_image }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image tag
        id: meta
        run: |
          REPOSITORY="$(echo "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')"
          echo "api_image=${REGISTRY}/${REPOSITORY}/evidencechain-api" >> "$GITHUB_OUTPUT"
          echo "web_image=${REGISTRY}/${REPOSITORY}/evidencechain-web" >> "$GITHUB_OUTPUT"
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            echo "image_tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "image_tag=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: api-runtime
          push: true
          tags: |
            ${{ steps.meta.outputs.api_image }}:${{ steps.meta.outputs.image_tag }}
            ${{ steps.meta.outputs.api_image }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: web-runtime
          push: true
          tags: |
            ${{ steps.meta.outputs.web_image }}:${{ steps.meta.outputs.image_tag }}
            ${{ steps.meta.outputs.web_image }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-vps:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure SSH
        run: |
          test -n "${{ secrets.VPS_HOST }}"
          test -n "${{ secrets.VPS_USER }}"
          test -n "${{ secrets.VPS_SSH_KEY }}"
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/evidencechain
          chmod 600 ~/.ssh/evidencechain
          ssh-keyscan -p "${{ secrets.VPS_PORT || '22' }}" "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Copy Compose file
        run: |
          APP_DIR="${{ secrets.VPS_APP_DIR || '/opt/evidencechain' }}"
          ssh -i ~/.ssh/evidencechain -p "${{ secrets.VPS_PORT || '22' }}" "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" "mkdir -p '$APP_DIR'"
          scp -i ~/.ssh/evidencechain -P "${{ secrets.VPS_PORT || '22' }}" docker-compose.yml "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:$APP_DIR/docker-compose.yml"

      - name: Pull and restart VPS stack
        run: |
          APP_DIR="${{ secrets.VPS_APP_DIR || '/opt/evidencechain' }}"
          IMAGE_TAG="${{ needs.build-and-push.outputs.image_tag }}"
          API_IMAGE="${{ needs.build-and-push.outputs.api_image }}"
          WEB_IMAGE="${{ needs.build-and-push.outputs.web_image }}"
          ssh -i ~/.ssh/evidencechain -p "${{ secrets.VPS_PORT || '22' }}" "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            "cd '$APP_DIR' \
            && test -f .env \
            && echo '${{ secrets.GITHUB_TOKEN }}' | docker login ghcr.io -u '${{ github.actor }}' --password-stdin \
            && EVIDENCECHAIN_API_IMAGE=\"$API_IMAGE:$IMAGE_TAG\" EVIDENCECHAIN_WEB_IMAGE=\"$WEB_IMAGE:$IMAGE_TAG\" docker compose pull \
            && EVIDENCECHAIN_API_IMAGE=\"$API_IMAGE:$IMAGE_TAG\" EVIDENCECHAIN_WEB_IMAGE=\"$WEB_IMAGE:$IMAGE_TAG\" docker compose up -d --remove-orphans \
            && docker compose ps"
